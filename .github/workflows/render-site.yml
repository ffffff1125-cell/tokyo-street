name: Render Site

on:
  push:
    branches:
      - main
    paths:
      - content.md
      - scripts/render-site.js
      - references/japanese-photo-theme.css
      - package.json
      - package-lock.json
      - .github/workflows/render-site.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Render HTML
        run: npm run render

      - name: Commit generated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html package-lock.json
          git diff --cached --quiet || git commit -m "Auto-render site"
          git push
